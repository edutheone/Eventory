{% extends "shared/auth_base.html" %}
{% load static %}

{% block title %}Forgot Password - EventHub{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/shared/auth.css' %}">
{% endblock %}

{% block content %}
<div class="auth-background reset-bg"></div>
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-card-inner">
            <a href="/" class="auth-back-btn">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div class="auth-logo">
                <div class="auth-logo-wrapper">
                    <div class="auth-logo-glow"></div>
                    <div class="auth-logo-icon">
                        <i class="fas fa-key"></i>
                    </div>
                </div>
            </div>
            <h2 class="auth-title">Forgot Password?</h2>
            <p class="auth-subtitle">Enter your email to receive a reset link</p>

            <!-- Role Selection Radio Buttons -->
            <div class="auth-role-group">
                <label class="auth-role-label">I am a:</label>
                <div class="auth-role-options">
                    <label class="auth-role-option">
                        <input type="radio" name="role_select" value="attendee" checked>
                        <span>🎟️ Attendee</span>
                    </label>
                    <label class="auth-role-option">
                        <input type="radio" name="role_select" value="organizer">
                        <span>📅 Organizer</span>
                    </label>
                </div>
            </div>

            <form id="forgotPasswordForm" novalidate>
                <input type="hidden" name="role" id="roleInput" value="attendee">
                <div class="auth-input-wrapper">
                    <i class="fas fa-envelope auth-input-icon"></i>
                    <input type="email" id="resetEmail" placeholder="Email address" class="auth-input" required>
                </div>
                <div id="emailError" class="error-message hidden"></div>

                <button type="submit" class="auth-btn">Send Reset Link</button>
            </form>

            <div class="auth-footer">
                <a href="/login/">Back to Sign In</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // Role selection handler
    const roleRadios = document.querySelectorAll('input[name="role_select"]');
    const roleInput = document.getElementById('roleInput');
    
    roleRadios.forEach(radio => {
        radio.addEventListener('change', function() {
            roleInput.value = this.value;
        });
    });
    
    const emailInput = document.getElementById('resetEmail');
    const emailError = document.getElementById('emailError');
    
    function validateEmail(email) {
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!email) return 'Email address is required';
        if (!emailRegex.test(email)) return 'Please enter a valid email address';
        return '';
    }
    
    emailInput.addEventListener('input', function() {
        const error = validateEmail(this.value);
        if (error) {
            emailError.textContent = error;
            emailError.classList.remove('hidden');
        } else {
            emailError.classList.add('hidden');
        }
    });
    
    document.getElementById('forgotPasswordForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const email = emailInput.value;
        const emailValidation = validateEmail(email);
        
        if (emailValidation) {
            emailError.textContent = emailValidation;
            emailError.classList.remove('hidden');
            return;
        }
        
        const submitBtn = this.querySelector('button[type="submit"]');
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
        submitBtn.disabled = true;
        
        setTimeout(() => {
            showToast('Reset link sent to your email!', 'success');
            submitBtn.innerHTML = originalText;
            submitBtn.disabled = false;
            setTimeout(() => {
                window.location.href = '/login/';
            }, 2000);
        }, 1500);
    });
    
    function showToast(message, type) {
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
</script>
{% endblock %}
