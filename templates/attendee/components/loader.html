{% load static %}
<!-- Enhanced Loader Component with Circulating Dots -->
<link rel="stylesheet" href="{% static 'css/attendee/components/loading-spinner.css' %}">

<div id="pageLoader" class="page-loader">
    <div class="loader-overlay"></div>
    <div class="loader-container">
        <!-- Circulating Dots Spinner -->
        <div class="circulating-dots">
            <div class="dot dot-1"></div>
            <div class="dot dot-2"></div>
            <div class="dot dot-3"></div>
            <div class="dot dot-4"></div>
            <div class="dot dot-5"></div>
            <div class="dot dot-6"></div>
            <div class="dot dot-7"></div>
            <div class="dot dot-8"></div>
            <div class="loader-center-logo">
                <i class="fas fa-calendar-alt"></i>
            </div>
        </div>
        <div class="loader-text">
            <div class="loading-bold">
                <span>LOADING</span>
                <div class="dots-container">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="{% static 'js/attendee/components/loading-spinner.js' %}"></script>
