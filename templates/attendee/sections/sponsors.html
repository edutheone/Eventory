                <div class="sponsor-item">

                </div>
                
                <!-- Duplicate for seamless looping -->
                <div class="sponsor-item">
                    <img src="{% static 'images/sponsors/google-1-1.svg' %}" alt="Google" class="sponsor-logo">
                </div>
                <div class="sponsor-item">
                    <img src="{% static 'images/sponsors/safaricom.svg' %}" alt="Safaricom" class="sponsor-logo">
                </div>

                </div>

</section>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const carousel = document.getElementById('sponsorsCarousel');
    let scrollInterval;
    let scrollSpeed = 1.5;
    let animationId = null;
    let lastTimestamp = 0;
    
    // Use requestAnimationFrame for smoother animation
    function smoothScroll(timestamp) {
        if (!carousel) return;
        
        // Calculate time delta for smooth frame-independent movement
        if (!lastTimestamp) {
            lastTimestamp = timestamp;
            animationId = requestAnimationFrame(smoothScroll);
            return;
        }
        
        // Move the carousel
        carousel.scrollLeft += scrollSpeed;
        
        // Reset position for infinite loop
        const maxScroll = carousel.scrollWidth / 2;
        if (carousel.scrollLeft >= maxScroll) {
            carousel.scrollLeft = 0;
        }
        
        lastTimestamp = timestamp;
        animationId = requestAnimationFrame(smoothScroll);
    }
    
    function startSmoothScroll() {
        if (animationId) {
            cancelAnimationFrame(animationId);
        }
        lastTimestamp = 0;
        animationId = requestAnimationFrame(smoothScroll);
    }
    
    function stopSmoothScroll() {
        if (animationId) {
            cancelAnimationFrame(animationId);
            animationId = null;
        }
    }
    
    // Start the smooth scroll
    startSmoothScroll();
    
    // Handle page visibility (stop when tab is inactive)
    document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
            stopSmoothScroll();
        } else {
            startSmoothScroll();
        }
    });
    
    // Handle window resize - reset position
    let resizeTimeout;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
            if (carousel) {
                carousel.scrollLeft = 0;
            }
        }, 250);
    });
    
    // Clean up on page unload
    window.addEventListener('beforeunload', () => {
        stopSmoothScroll();
    });
});
</script>
