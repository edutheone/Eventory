{% extends 'attendee/base.html' %}
{% load static %}

{% block title %}Event Details - EventHub{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/attendee/event/event-detail.css' %}">
<link rel="stylesheet" href="{% static 'css/attendee/event/events.css' %}">
{% endblock %}

{% block content %}
<div class="event-detail-page">
    <div class="container">
        <div class="event-detail-container" id="eventDetailContainer">
            <!-- Content will be loaded here - no internal loader -->
        </div>
    </div>
</div>

<!-- Review Modal -->
<div class="modal" id="reviewModal">
    <div class="modal-content">
        <span class="modal-close">&times;</span>
        <h3>Write a Review</h3>
        <form id="reviewForm">
            <div class="form-group">
                <label>Rating</label>
                <div class="rating-select" style="display: flex; gap: 0.5rem; font-size: 1.5rem; color: #cbd5e1; cursor: pointer;">
                    <i class="fas fa-star" data-rating="1"></i>
                    <i class="fas fa-star" data-rating="2"></i>
                    <i class="fas fa-star" data-rating="3"></i>
                    <i class="fas fa-star" data-rating="4"></i>
                    <i class="fas fa-star" data-rating="5"></i>
                </div>
                <input type="hidden" id="reviewRating" value="5">
            </div>
            <div class="form-group">
                <label>Title</label>
                <input type="text" id="reviewTitle" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Your Review</label>
                <textarea id="reviewText" rows="4" class="form-control" required></textarea>
            </div>
            <button type="submit" class="submit-review-btn">Submit Review</button>
        </form>
    </div>
</div>

{% include 'attendee/events/checkout_modal.html' %}
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/attendee/payments/checkout.js' %}"></script>
<script src="{% static 'js/attendee/events/event-detail.js' %}"></script>
{% endblock %}
