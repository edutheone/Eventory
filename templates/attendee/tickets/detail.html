{% extends 'attendee/base.html' %}
{% load static %}

{% block title %}Ticket Details - EventHub{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/attendee/tickets/ticket-detail.css' %}">
{% endblock %}

{% block content %}
<div class="ticket-detail-container">
    <div class="detail-header">
        <h1><i class="fas fa-ticket-alt"></i> Ticket Details</h1>
        <p class="text-muted">View your ticket information</p>
    </div>

    <div id="ticketDetailContent">
        <div class="loading-state">
            <div class="loading-spinner"></div>
            <p>Loading ticket details...</p>
        </div>
    </div>

    <div class="detail-actions">
        <button class="btn-back" onclick="window.location.href='/tickets/'">
            <i class="fas fa-arrow-left"></i> Back to Tickets
        </button>
        <button class="btn-events" onclick="window.location.href='/events/'">
            <i class="fas fa-calendar-alt"></i> Browse More Events
        </button>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/attendee/tickets/tickets.js' %}"></script>
{% endblock %}
