<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EventHub Organizer{% endblock %}</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Outfit:wght@300..800&display=swap" rel="stylesheet">
    <!-- Font Awesome + Bootstrap -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Global Dashboard CSS (dark theme) -->
    <link rel="stylesheet" href="/static/css/organizers/dashboard.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
<nav class="top-navbar">
    <div class="navbar-brand">
        <h2>EventHub</h2>
    </div>
    <button class="navbar-toggle" id="navbarToggleBtn" aria-expanded="false" aria-label="Toggle Navigation">
        <i class="fas fa-bars"></i>
    </button>
    <div class="navbar-menu" id="navbarMenu">
        <a href="/organizer/dashboard/" class="menu-item">Dashboard</a>
        <a href="/organizer/events/" class="menu-item">Events</a>
        <a href="/organizer/attendees/" class="menu-item">Attendees</a>
        <a href="/organizer/bookings/" class="menu-item">Bookings</a>

        <a href="/organizer/promotions/" class="menu-item">Promotions</a>
        <a href="/organizer/reviews/" class="menu-item">Reviews</a>
        <a href="/organizer/settings/" class="menu-item">Settings</a>
        <a href="/organizer/faq/" class="menu-item">FAQs</a>
        <a href="/" class="menu-item back-home-mobile">Back to Home</a>
    </div>
    <div class="navbar-user">
        <span id="organizerProfileEmail" class="profile-email">{{ user.email|default:"Organizer" }}</span>
        <a href="/" class="back-home-btn" title="Back to Home"><i class="fas fa-sign-out-alt"></i></a>
    </div>
</nav>

<div class="dashboard-wrapper">
    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/static/js/attendee/errors/error-handler.js"></script>
<script src="/static/js/organizer/api.config.js"></script>
<script src="/static/js/organizer/api.service.js"></script>
<script src="/static/js/organizer/api.endpoints.js"></script>
<script src="/static/js/organizer/dashboard.js"></script>
<script>
    (function syncOrganizerProfileEmail() {
        const el = document.getElementById('organizerProfileEmail');
        if (!el) return;

        // Session-rendered email if available.
        const serverEmail = (el.textContent || '').trim();
        if (serverEmail && serverEmail !== 'Organizer') return;

        // Token-based login fallback used by current organizer auth flow.
        try {
            const raw = localStorage.getItem('organizer_user');
            if (!raw) return;
            const user = JSON.parse(raw);
            if (user && user.email) {
                el.textContent = user.email;
            }
        } catch (e) {
            // Keep default label when storage is unavailable.
        }
    })();

    (function highlightActiveMenuItem() {
        const currentPath = window.location.pathname;
        const menuItems = document.querySelectorAll('.navbar-menu .menu-item');
        
        menuItems.forEach(item => {
            const href = item.getAttribute('href');
            if (!href) return;
            
            // Highlight if exact match or if it is a sub-path of the current item (excluding dashboard/root path)
            const isExactMatch = currentPath === href || currentPath === href + '/';
            const isSubPathMatch = href !== '/organizer/dashboard/' && href !== '/' && currentPath.startsWith(href);
            
            if (isExactMatch || isSubPathMatch) {
                item.classList.add('active');
            } else {
                item.classList.remove('active');
            }
        });
    })();

    (function initNavbarToggle() {
        const toggleBtn = document.getElementById('navbarToggleBtn');
        const menu = document.getElementById('navbarMenu');
        if (!toggleBtn || !menu) return;
        toggleBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            const expanded = toggleBtn.getAttribute('aria-expanded') === 'true';
            toggleBtn.setAttribute('aria-expanded', !expanded);
            menu.classList.toggle('show');
        });
        document.addEventListener('click', function(e) {
            if (menu.classList.contains('show') && !menu.contains(e.target) && e.target !== toggleBtn) {
                toggleBtn.setAttribute('aria-expanded', 'false');
                menu.classList.remove('show');
            }
        });
    })();
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
