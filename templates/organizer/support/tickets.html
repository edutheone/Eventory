{% extends "organizer/base.html" %}
{% block title %}Support{% endblock %}
{% block nav_support %}active{% endblock %}
{% block content %}
<div class="container-fluid px-4 py-4">
    <div class="d-flex justify-content-between"><h1 class="h2">Support Center</h1><button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#newTicketModal">New Ticket</button></div>
    <div class="row g-4"><div class="col-lg-8"><div class="stat-card"><h5>My Tickets</h5><table class="table"><thead><tr><th>ID</th><th>Subject</th><th>Status</th><th>Updated</th><th>Action</th></tr></thead><tbody id="ticketList"></tbody></table><nav><ul class="pagination" id="supportPagination"></ul></nav></div></div><div class="col-lg-4"><div class="stat-card"><h5>FAQ</h5><div id="faqList"></div></div><div class="stat-card mt-4"><h5>Guides</h5><div id="guidesList"></div></div></div></div>
</div>
<div class="modal fade" id="newTicketModal"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5>New Ticket</h5></div><div class="modal-body"><input type="text" id="ticketSubject" class="form-control mb-2" placeholder="Subject"><select id="ticketCategory" class="form-select mb-2"><option value="general">General</option><option value="technical">Technical</option><option value="billing">Billing</option></select><textarea id="ticketMessage" class="form-control" rows="4" placeholder="Message"></textarea></div><div class="modal-footer"><button class="btn btn-primary" id="createTicketBtn">Submit</button></div></div></div></div>
<div class="modal fade" id="ticketDetailModal"><div class="modal-dialog modal-lg"><div class="modal-content"><div class="modal-header"><h5>Ticket #<span id="ticketDetailId"></span></h5></div><div class="modal-body" id="ticketDetailBody"></div><div class="modal-footer"><textarea id="replyMessage" class="form-control mb-2" rows="2" placeholder="Reply"></textarea><button class="btn btn-primary" id="replyTicketBtn">Send Reply</button></div></div></div></div>
{% endblock %}
{% block extra_js %}
<script>
    let supportPage=1, currentTicket=null;
    async function loadTickets(){ let data=await OrganizerAPI.support.getTickets(supportPage,20,'all'); let html=data.results.map(t=>`<tr><td>#${t.id}</td><td>${t.subject}</td><td><span class="badge ${t.status=='open'?'bg-warning':t.status=='closed'?'bg-secondary':'bg-info'}">${t.status}</span></td><td>${new Date(t.updated_at).toLocaleDateString()}</td><td><button class="btn btn-sm btn-outline-primary viewTicket" data-id="${t.id}">View</button></td></tr>`).join(''); document.getElementById('ticketList').innerHTML=html||'<tr><td colspan="5">No tickets</td></tr>'; window.renderPagination(data,supportPage,(p)=>{supportPage=p;loadTickets();},'supportPagination'); attachViewTickets(); }
    async function viewTicket(id){ let t=await OrganizerAPI.support.getTicketDetail(id); currentTicket=id; document.getElementById('ticketDetailId').innerText=id; let replies=t.replies?.map(r=>`<div class="border-bottom py-2"><strong>${r.is_staff?'Support':'You'}:</strong> ${r.message}<br><small>${new Date(r.created_at).toLocaleString()}</small></div>`).join(''); document.getElementById('ticketDetailBody').innerHTML=`<div><strong>Subject:</strong> ${t.subject}</div><div><strong>Status:</strong> ${t.status}</div><div class="alert alert-secondary">${t.message}</div>${replies||''}`; new bootstrap.Modal(document.getElementById('ticketDetailModal')).show(); }
    async function replyToTicket(){ let msg=document.getElementById('replyMessage').value; if(!msg) return; await OrganizerAPI.support.replyToTicket(currentTicket,msg); window.showToast('Reply sent','success'); document.getElementById('replyMessage').value=''; viewTicket(currentTicket); loadTickets(); }
    async function createTicket(){ let sub=document.getElementById('ticketSubject').value; let cat=document.getElementById('ticketCategory').value; let msg=document.getElementById('ticketMessage').value; if(!sub||!msg) return; await OrganizerAPI.support.createTicket(sub,cat,msg); window.showToast('Ticket created','success'); bootstrap.Modal.getInstance(document.getElementById('newTicketModal')).hide(); loadTickets(); }
    async function loadFAQ(){ let faqs=await OrganizerAPI.support.getFAQ(); let html=faqs.map(f=>`<div class="mb-2"><strong>${f.question}</strong><p class="small">${f.answer}</p></div>`).join(''); document.getElementById('faqList').innerHTML=html||'No FAQs'; }
    async function loadGuides(){ let guides=await OrganizerAPI.support.getGuides(); let html=guides.map(g=>`<div><a href="${g.url}" target="_blank">${g.title}</a></div>`).join(''); document.getElementById('guidesList').innerHTML=html||'No guides'; }
    function attachViewTickets(){ document.querySelectorAll('.viewTicket').forEach(btn=>btn.onclick=()=>viewTicket(btn.dataset.id)); }
    document.getElementById('createTicketBtn').onclick=createTicket; document.getElementById('replyTicketBtn').onclick=replyToTicket; loadTickets(); loadFAQ(); loadGuides();
</script>
{% endblock %}
