services:
  - type: web
    name: eventhub-backend
    env: python
    plan: free
    buildCommand: apt-get update && apt-get install -y tesseract-ocr && pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
